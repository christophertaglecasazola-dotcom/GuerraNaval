<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guerra Naval Online</title>

    <link rel="stylesheet" href="Cliente/style.css">

    <!-- Socket.IO -->
    <script src="/socket.io/socket.io.js"></script>
</head>

<body>

    <header>
        <h1>⚓ Guerra Naval Online</h1>
    </header>

    <!-- ===================== -->
    <!-- MENU PRINCIPAL -->
    <!-- ===================== -->

    <section id="menu">

        <button id="crearSala">
            Crear Sala
        </button>

        <br><br>

        <input
            type="text"
            id="codigoSala"
            placeholder="Código de sala">

        <button id="unirseSala">
            Unirse
        </button>

        <br><br>

        <h3 id="codigoGenerado"></h3>

    </section>

    <hr>

    <!-- ===================== -->
    <!-- INFORMACIÓN -->
    <!-- ===================== -->

    <section id="estado">

        <h2>Estado del Juego</h2>

        <p id="mensaje">
            Esperando...
        </p>

    </section>

    <hr>

    <!-- ===================== -->
    <!-- TABLERO -->
    <!-- ===================== -->

    <section id="tablero">

        <h2>Tablero</h2>

        <div id="grid"></div>

    </section>

    <script src="Cliente/socket.js"></script>
    <script src="Cliente/script.js"></script>
</body>
</html>

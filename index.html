<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Guerra Naval</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="Cliente/style.css">
</head>

<body>

    <!-- BURBUJAS -->
    <div class="burbujas" aria-hidden="true">
        <div class="burbuja"></div>
        <div class="burbuja"></div>
        <div class="burbuja"></div>
        <div class="burbuja"></div>
        <div class="burbuja"></div>
        <div class="burbuja"></div>
        <div class="burbuja"></div>
        <div class="burbuja"></div>
        <div class="burbuja"></div>
        <div class="burbuja"></div>
        <div class="burbuja"></div>
        <div class="burbuja"></div>
    </div>

    <!-- OLA -->
    <div class="ola-fondo" aria-hidden="true">
        <svg viewBox="0 0 1440 320" preserveAspectRatio="none">
            <path class="ola-path-1"
                d="M0,224L48,213.3C96,203,192,181,288,186.7C384,192,480,224,576,234.7C672,245,768,235,864,208C960,181,1056,139,1152,144C1248,149,1344,203,1392,229.3L1440,256L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z">
            </path>

            <path class="ola-path-2"
                d="M0,288L48,272C96,256,192,224,288,213.3C384,203,480,213,576,229.3C672,245,768,267,864,261.3C960,256,1056,224,1152,213.3C1248,203,1344,213,1392,218.7L1440,224L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z">
            </path>
        </svg>
    </div>

    <!-- HEADER -->

    <header>

        <h1>⚓ Guerra Naval</h1>

        <p>Batalla multijugador</p>

    </header>

    <!-- SALA -->

    <section id="sala">

        <h2>Sala de juego</h2>

        <button id="crearSala">
            Crear Sala
        </button>

        <div id="codigoCreado">
            Tu código:
            <span id="codigoSala">
                -----
            </span>
        </div>

        <hr>

        <input
            id="codigoEntrada"
            type="text"
            placeholder="Código de sala">

        <button id="unirseSala">
            Unirse
        </button>

        <p id="estadoSala">
            Esperando jugadores...
        </p>

    </section>

    <!-- JUEGO -->

    <main id="juego">

        <!-- TABLERO JUGADOR -->

        <section class="zona">

            <h2>Tu flota</h2>

            <div
                id="tableroJugador"
                class="tablero">
            </div>

        </section>

        <!-- TABLERO ENEMIGO -->

        <section class="zona">

            <h2>Enemigo</h2>

            <div
                id="tableroEnemigo"
                class="tablero">
            </div>

            <!-- ESTADO DE LA PARTIDA -->

            <div id="mensajeEstado">

                <h3 id="tituloMensaje">
                    Esperando partida...
                </h3>

                <p id="textoMensaje">

                </p>

            </div>

        </section>

        <!-- FLOTA -->

        <aside id="flota">

            <h2>Mis barcos</h2>

            <div
                class="barco"
                id="acorazado">

                ⚓ Acorazado

                <span>██████</span>

            </div>

            <div
                class="barco"
                id="portaaviones">

                🚢 Portaaviones

                <span>█████</span>

            </div>

            <div
                class="barco"
                id="buque">

                ⛴ Buque

                <span>████</span>

            </div>

            <div
                class="barco"
                id="crucero">

                🚤 Crucero

                <span>███</span>

            </div>

            <div
                class="barco"
                id="destructor">

                🛥 Destructor

                <span>██</span>

            </div>

        </aside>

    </main>

    <!-- RESULTADO -->

    <section
        id="resultado"
        class="oculto">

        <h1 id="resultadoTitulo">

        </h1>

        <p id="resultadoTexto">

        </p>

        <button id="reiniciar">
            Nueva partida
        </button>

    </section>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <script src="/Cliente/socket.js"></script>
    <script src="/Cliente/script.js"></script>

</body>

</html>
